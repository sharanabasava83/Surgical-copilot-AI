# =====================================================================
# OPTIONAL local-dev profile using an embedded file DB instead of MySQL.
# This profile uses H2 in MySQL-compatibility mode so you can run the
# app instantly without installing/configuring MySQL.
#
# Activate with:
#   mvn spring-boot:run -Dspring-boot.run.profiles=devlocal
# =====================================================================

spring.datasource.url=jdbc:h2:file:./data/surgicalcopilot;MODE=MySQL;DATABASE_TO_LOWER=TRUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.jpa.show-sql=false

app.demo-mode=true
