# =====================================================================
# Global AI Surgical Copilot Ecosystem - Backend Configuration
# DEMO / PORTFOLIO PROJECT - NOT a certified medical device.
# =====================================================================

spring.application.name=surgical-copilot-backend

# ---------------------------------------------------------------------
# MySQL Database (primary)
# Create the database first:  CREATE DATABASE surgical_copilot;
# ---------------------------------------------------------------------
spring.datasource.url=jdbc:mysql://localhost:3306/surgical_copilot?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=your_mysql_password
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ---------------------------------------------------------------------
# JPA / Hibernate
# ddl-auto=update will auto-create/update tables from entities on startup.
# Switch to "validate" once your schema is stable in a real environment.
# ---------------------------------------------------------------------
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.open-in-view=false

# ---------------------------------------------------------------------
# Server
# ---------------------------------------------------------------------
server.port=8080

spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=20MB

# ---------------------------------------------------------------------
# CORS - allow the React dev server to call this API
# ---------------------------------------------------------------------
app.cors.allowed-origins=http://localhost:5173

# ---------------------------------------------------------------------
# External API keys (placeholders - add your own, never commit real keys)
# ---------------------------------------------------------------------
app.integrations.translation.provider=none
app.integrations.translation.api-key=YOUR_TRANSLATION_API_KEY_HERE
app.integrations.translation.api-url=https://libretranslate.com/translate

app.integrations.chatbot.provider=none
app.integrations.chatbot.api-key=YOUR_LLM_API_KEY_HERE
# Leave api-url and model blank to use each provider's default endpoint/model.
app.integrations.chatbot.api-url=
app.integrations.chatbot.model=
#
# To enable the AI Medical Chatbot with a real LLM:
#   1. Set provider to "anthropic" (Claude) or "openai" (ChatGPT)
#   2. Paste your real API key into api-key below
#   3. Leave api-url/model blank for sensible defaults, or override them
#
# Example - Anthropic Claude:
#   app.integrations.chatbot.provider=anthropic
#   app.integrations.chatbot.api-key=sk-ant-xxxxxxxxxxxxxxxx
#
# Example - OpenAI:
#   app.integrations.chatbot.provider=openai
#   app.integrations.chatbot.api-key=sk-xxxxxxxxxxxxxxxx
#
# Never commit a real key to a public repo.

app.integrations.maps.api-key=YOUR_MAPS_API_KEY_HERE

# ---------------------------------------------------------------------
# Demo / safety flag - surfaced via /api/system/info
# ---------------------------------------------------------------------
app.demo-mode=true
app.disclaimer=This system is a software architecture demo. It is not a certified medical device and must not be used for real clinical, diagnostic, or treatment decisions.
